<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <h1 class="site-title">Portfolio</h1>
  <p class="site-subtitle">Tableaux tissus &amp; photomontages</p>
</header>

<main id="years"></main>

<footer class="site-footer">
  <p>&copy; <span id="year"></span></p>
</footer>

<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" id="lightbox-close" aria-label="Fermer">&times;</button>
  <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Image précédente">&#8249;</button>
  <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Image suivante">&#8250;</button>
  <div class="lightbox-content">
    <div class="lightbox-image-wrap" id="lightbox-media"></div>
    <div class="lightbox-info">
      <h2 id="lightbox-title"></h2>
      <p class="lightbox-meta" id="lightbox-meta"></p>
      <p id="lightbox-description"></p>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
